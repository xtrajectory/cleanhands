<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"> <!-- 加入 viewport-fit=cover -->
    <title>Cleanhands page </title>
    <style>
        /* === 全局變量與基礎設置 === */
        :root {
            --bg-color: black;
            --text-color: white;
            --primary-color: orange;
            --accent-color: #C6A300;
            --glass-bg: rgba(30, 30, 30, 0.8);
            --glass-border: rgba(255, 255, 255, 0.15);
            --grey-text: #aaa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px 0 100px 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* === 天氣小部件 (右上角) === */
        .weather-widget {
            position: fixed;
            /* 默認位置 */
            top: 20px;
            right: 20px;
            
            /* 樣式 */
            background: rgba(40, 40, 40, 0.6); /* 稍微深一點的背景 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 30px; /* 更圓潤 */
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999; /* 確保在最上層 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.5s;
            
            /* 確保不換行 */
            white-space: nowrap;
        }

        .weather-icon { font-size: 24px; line-height: 1; }
        
        .weather-info { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            line-height: 1.2;
        }
        
        .weather-temp { font-size: 18px; font-weight: bold; color: var(--primary-color); }
        .weather-desc { font-size: 11px; color: #ccc; margin-top: 2px;}

        /* === Hero 時間顯示區 === */
        .hero-section {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease-out;
            margin-top: 40px; /* 避免被天氣擋住 */
        }

        .hero-time {
            font-size: 4.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(198, 163, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }

        .hero-date {
            font-size: 2rem;
            color: var(--primary-color);
            margin-top: 10px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        h1 {
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #ccc;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 1px;
            display: inline-block;
        }

        /* === 主結果顯示區 === */
        #result {
            font-size: 24px;
            color: var(--accent-color);
            margin-top: 5px;
            padding: 20px 40px;
            border: 1px solid var(--accent-color);
            border-radius: 16px;
            background: rgba(198, 163, 0, 0.1);
            box-shadow: 0 0 30px rgba(198, 163, 0, 0.15);
            text-align: center;
            font-weight: bold;
            max-width: 90%;
            backdrop-filter: blur(5px);
        }

        /* === 按鈕區域 === */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            width: 95%;
            max-width: 800px;
            flex-wrap: nowrap; /* 強制不換行 */
        }

        .button-container button {
            background-color: var(--glass-bg);
            color: #ddd;
            font-size: 15px;
            border: 1px solid var(--glass-border);
            padding: 12px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .button-container button:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* === 結果展示卡片 === */
        .result-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px 35px;
            margin: 30px auto;
            width: fit-content;
            max-width: 95vw;
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.4s ease-out;
            box-sizing: border-box;
            display: block;
        }

        /* === 未來五天表格 === */
        .modern-table {
            border-collapse: collapse;
            margin: 0 auto;
        }
        
        .modern-table th {
            text-align: center;
            color: var(--grey-text);
            font-size: 13px;
            padding: 0 15px 10px 15px;
            border-bottom: 1px solid var(--glass-border);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .modern-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 16px;
            white-space: nowrap;
            text-align: center;
        }

        .modern-table tr:last-child td { border-bottom: none; }

        .date-start { color: #ccc; }
        .arrow { color: #666; font-size: 14px; padding: 0 5px; }
        .date-end { color: var(--primary-color); font-weight: bold; }
        .header-highlight { color: var(--accent-color); font-weight: bold; }

        /* === 驗算列表 === */
        .verify-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            gap: 40px;
            white-space: nowrap;
        }

        .verify-days-count { font-size: 32px; color: var(--accent-color); font-weight: bold; }
        .verify-days-label { color: var(--grey-text); font-size: 14px; }
        
        .verify-subtitle {
            text-align: left;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            white-space: nowrap;
        }

        .timeline-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .timeline-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
            gap: 30px;
        }

        .timeline-left { display: flex; align-items: center; gap: 12px; }

        .timeline-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #ff4d4d;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
            flex-shrink: 0;
        }

        .timeline-date { color: #fff; font-size: 16px; }
        .timeline-reason { color: #ff6666; font-size: 15px; text-align: right; }
        .timeline-empty { color: #4CAF50; text-align: center; padding: 15px; font-style: italic; white-space: nowrap; }

        /* === 底部按鈕與其他 === */
        .map-button-container {
            position: fixed;
            right: 20px; bottom: 30px; z-index: 100;
        }
        .map-button {
            background-color: #977C00;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            margin-bottom: 8px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .map-button:active { transform: scale(0.95); }
        a { text-decoration: none; }

        #lastUpdated {
            position: fixed; bottom: 10px; right: 20px;
            font-size: 12px; color: #555; z-index: 90;
        }

        #disclaimer { font-size: 12px; margin-top: 20px; color: #555; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* === 手機適配 (重點修改) === */
        @media (max-width: 768px) {
            /* 手機版天氣顯示修復 */
            .weather-widget {
                /* 使用 max() 函數與 safe-area-inset-top 避開瀏海 */
                top: max(15px, env(safe-area-inset-top));
                right: 15px;
                
                /* 加深背景以提高在手機上的可見度 */
                background: rgba(0, 0, 0, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.2);
                
                /* 稍微縮小一點點以免太擠 */
                padding: 6px 12px;
            }
            
            .weather-temp { font-size: 15px; }
            .weather-icon { font-size: 20px; }

            .hero-time { font-size: 3.5rem; }
            .hero-date { font-size: 1.5rem; }
            
            /* 手機上允許結果框橫向滾動 */
            .result-box { max-width: 95%; overflow-x: auto; }
            
            /* 按鈕容器 */
            .button-container {
                gap: 8px; 
                padding: 0 10px;
            }
            
            .button-container button {
                font-size: 13px;
                padding: 10px 2px;
            }

            .map-button-container {
                right: 0; bottom: 0; left: 0;
                display: flex; justify-content: space-around;
                background-color: rgba(0, 0, 0, 0.95);
                padding: 12px 5px;
                border-top: 1px solid #333;
                backdrop-filter: blur(10px);
            }
            .map-button { padding: 8px 10px; font-size: 13px; margin: 0 2px; flex: 1; white-space: nowrap; }
            #lastUpdated { bottom: 70px; width: 100%; text-align: center; right: 0; }
        }
    </style>

<body oncontextmenu="return false;">

        <div class="weather-info">
            <div class="weather-temp" id="weatherTemp">--°C</div>
            <div class="weather-desc">澳門</div>
        </div>
    </div>

    <!-- Hero 時間顯示區 -->
    <div class="hero-section">
        <div id="heroTime" class="hero-time">00:00:00</div>
        <div id="heroDate" class="hero-date">Loading...</div>
    </div>

    <h1 id="randomTitle">日期計算</h1>

    <div id="result">計算中...</div>
    
    <!-- 操作按鈕 -->

    <div id="futureDatesTable" style="display: none;"></div>

    <p id="disclaimer">計算結果僅供參考。</p>

    <!-- 底部導航 -->
    <div class="map-button-container">
        <a href="schedule.html"><button class="map-button">📅 Schedule</button></a>
        <a href="age_calculator.html"><button class="map-button">🧮 年齡計算</button></a>
        <a href="sums calculate.html"><button class="map-button">🔢 總和計算</button></a>
        <a href="https://www.google.com/maps/d/u/0/edit?mid=1smbxbgyDyi21YkzAcOjm2j5B3Ru5KhY&ll=22.196278957288584%2C113.54682999548615&z=16" target="_blank"><button class="map-button">🗺️ 地圖</button></a>
    </div>

    <div id="lastUpdated"></div>

    <script>
    // ================= 配置與數據 =================
    const CONFIG = {
        daysToAdd: 15,
        titles: ["我是計算器"]
    };

    const WEEKDAYS = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];

    const SPECIAL_HOLIDAYS = {
        "2025-01-01": "元旦",
        "2025-01-28": "農曆除夕",
        "2025-01-29": "農曆正月初一",
        "2025-01-30": "農曆正月初二",
        "2025-01-31": "農曆正月初三",
        "2025-04-04": "清明節",
        "2025-04-18": "耶穌受難日",
        "2025-04-19": "復活節前日",
        "2025-04-21": "復活節前日的補假",
        "2025-05-01": "勞動節",
        "2025-05-05": "佛誕節",
        "2025-05-31": "端午節",
        "2025-06-02": "端午節的補假",
        "2025-10-01": "中華人民共和國國慶日",
        "2025-10-02": "中華人民共和國國慶日翌日",
        "2025-10-07": "中秋節翌日",
        "2025-10-29": "重陽節",
        "2025-11-02": "追思節",
        "2025-11-03": "追思節的補假",
        "2025-12-08": "聖母無原罪瞻禮",
        "2025-12-20": "澳門特別行政區成立紀念日",
        "2025-12-21": "冬至",
        "2025-12-22": "澳門特別行政區成立紀念日的補假",
        "2025-12-23": "冬至的補假",
        "2025-12-24": "聖誕節前日",
        "2025-12-25": "聖誕節",
        "2025-12-31": "除夕",
        "2026-01-01": "元旦",
        "2026-02-16": "農曆除夕(下午)",
        "2026-02-17": "農曆正月初一",
        "2026-02-18": "農曆正月初二",
        "2026-02-19": "農曆正月初三",
        "2026-04-03": "耶穌受難日",
        "2026-04-04": "復活節前日",
        "2026-04-05": "清明節",
        "2026-04-06": "復活節前日的補假",
        "2026-04-07": "清明節的補假",
        "2026-05-01": "勞動節",
        "2026-05-24": "佛誕節",
        "2026-05-25": "佛誕節的補假",
        "2026-06-19": "端午節",
        "2026-09-26": "中秋節翌日",
        "2026-09-28": "中秋節翌日的補假",
        "2026-10-01": "中華人民共和國國慶日",
        "2026-10-02": "中華人民共和國國慶日翌日",
        "2026-10-18": "重陽節",
        "2026-10-19": "重陽節的補假",
        "2026-11-02": "追思節",
        "2026-12-08": "聖母無原罪瞻禮",
        "2026-12-20": "澳門特別行政區成立紀念日",
        "2026-12-21": "澳門特別行政區成立紀念日的補假",
        "2026-12-22": "冬至",
        "2026-12-24": "聖誕節前日",
        "2026-12-25": "聖誕節",
        "2026-12-31": "除夕(下午)"
    };

    const preventDefault = (e) => { e.preventDefault(); return false; };
    document.addEventListener('contextmenu', preventDefault);
    document.addEventListener('selectstart', preventDefault);
    document.addEventListener('copy', preventDefault);
    document.addEventListener('cut', preventDefault);
    document.addEventListener('paste', preventDefault);
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey && ['a', 'c', 'v'].includes(e.key.toLowerCase())) || e.key === 'F12') {
            preventDefault(e);
        }
    });

    function formatDateKey(date) { return date.toISOString().split('T')[0]; }

    function checkRestDay(date) {
        const dayOfWeek = date.getDay();
        const dateStr = formatDateKey(date);
        if (dayOfWeek === 0) return { isRestDay: true, reason: "星期日" };
        if (dayOfWeek === 6) return { isRestDay: true, reason: "星期六" };
        if (SPECIAL_HOLIDAYS[dateStr]) return { isRestDay: true, reason: SPECIAL_HOLIDAYS[dateStr] };
        return { isRestDay: false, reason: "" };
    }

    function calculateWorkdayDate(startDate, daysToAdd) {
        let targetDate = new Date(startDate.getTime() + daysToAdd * 24 * 60 * 60 * 1000);
        let logs = [];
        while (true) {
            const status = checkRestDay(targetDate);
            if (status.isRestDay) {
                logs.push({ dateStr: formatDateKey(targetDate), dateObj: new Date(targetDate), reason: status.reason });
                targetDate.setDate(targetDate.getDate() + 1);
            } else { break; }
        }
        return { date: targetDate, logs: logs };
    }

    async function fetchMacauWeather() {
        const widget = document.getElementById('weatherWidget');
        const iconEl = document.getElementById('weatherIcon');
        const tempEl = document.getElementById('weatherTemp');
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=22.1987&longitude=113.5439&current_weather=true');
            const data = await response.json();
            if(data && data.current_weather) {
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                let icon = '☀️';
                if ([1, 2, 3].includes(code)) icon = '⛅';
                else if ([45, 48].includes(code)) icon = '🌫️';
                else if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) icon = '🌧️';
                else if ([95, 96, 99].includes(code)) icon = '⛈️';
                iconEl.textContent = icon;
                tempEl.textContent = `${temp}°C`;
                widget.style.display = 'flex';
            }
        } catch (e) { console.log("Weather fetch failed", e); widget.style.display = 'none'; }
    }

    function updateTimeDisplays() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
        const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${WEEKDAYS[now.getDay()]}`;
        document.getElementById('heroTime').textContent = timeStr;
        document.getElementById('heroDate').textContent = dateStr;
        document.getElementById('lastUpdated').textContent = `最後更新：${dateStr} ${timeStr}`;
    }

    function updateMainDisplay() {
        const today = new Date();
        const result = calculateWorkdayDate(today, CONFIG.daysToAdd);
        const d = result.date;
        document.getElementById('result').textContent = `${CONFIG.daysToAdd}天的日期：${d.getMonth() + 1}月${d.getDate()}日 ${WEEKDAYS[d.getDay()]}`;
    }

    function toggleFutureDates() {
        const tableDiv = document.getElementById('futureDatesTable');
        const verifyDiv = document.getElementById('verificationResult');
        verifyDiv.style.display = 'none';
        if (tableDiv.style.display === 'block') {
            tableDiv.style.display = 'none';
        } else {
            let html = `
                <div class="result-box">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th style="text-align:center;">今天</th>
                                <th></th>
                                <th style="text-align:center;" class="header-highlight">第${CONFIG.daysToAdd}天</th>
                            </tr>
                        </thead>
                        <tbody>`;
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            for (let i = 0; i < 5; i++) {
                const baseDate = new Date(tomorrow.getTime() + i * 86400000);
                const res = calculateWorkdayDate(baseDate, CONFIG.daysToAdd);
                const d = res.date;
                const baseText = `${baseDate.getMonth() + 1}/${baseDate.getDate()} (${WEEKDAYS[baseDate.getDay()].replace('星期','週')})`;
                const resText = `${d.getMonth() + 1}/${d.getDate()} (${WEEKDAYS[d.getDay()].replace('星期','週')})`;
                
                html += `
                    <tr>
                        <td class="date-start">${baseText}</td>
                        <td class="arrow">➔</td>
                        <td class="date-end">${resText}</td>
                    </tr>`;
            }
            html += `</tbody></table><div style="text-align:center; margin-top:15px; font-size:12px; color:#666;">(未來5天預測)</div></div>`;
            tableDiv.innerHTML = html;
            tableDiv.style.display = 'block';
        }
    }

    function toggleVerification() {
        const verifyDiv = document.getElementById('verificationResult');
        const tableDiv = document.getElementById('futureDatesTable');
        tableDiv.style.display = 'none';
        if (verifyDiv.style.display === 'block') {
            verifyDiv.style.display = 'none';
        } else {
            const today = new Date();
            const result = calculateWorkdayDate(today, CONFIG.daysToAdd);
            const endDate = result.date;
            const totalDays = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            
            let html = `<div class="result-box"><div class="verify-summary"><div class="verify-days-label">總跨度天數</div><div class="verify-days-count">${totalDays} 天</div></div>`;
            
            if (result.logs.length > 0) {
                html += `<div class="verify-subtitle">第${CONFIG.daysToAdd}天遇到以下假期，需要順延：</div>`;
                html += `<div class="timeline-list">`;
                result.logs.forEach(log => {
                    const dateShort = `${log.dateObj.getMonth()+1}/${log.dateObj.getDate()}`;
                    const weekDayShort = WEEKDAYS[log.dateObj.getDay()].replace('星期','');
                    html += `<div class="timeline-row"><div class="timeline-left"><span class="timeline-dot"></span><span class="timeline-date">${dateShort} (${weekDayShort})</span></div><span class="timeline-reason">${log.reason}</span></div>`;
                });
                html += `</div>`;
            } else { 
                html += `<div class="timeline-empty">🎉 期間無任何假期或週末，無需順延。</div>`; 
            }
            
            html += `</div>`;
            verifyDiv.innerHTML = html;
            verifyDiv.style.display = 'block';
        }
    }

    function export120DaysTable() {
        try {
            const rows = [];
            rows.push('<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet" xmlns:html="http://www.w3.org/TR/REC-html40">');
            rows.push('<Styles><Style ss:ID="Default"><Alignment ss:Horizontal="Center" ss:Vertical="Center"/><Borders><Border ss:Position="Left" ss:LineStyle="Continuous" ss:Weight="1"/><Border ss:Position="Top" ss:LineStyle="Continuous" ss:Weight="1"/><Border ss:Position="Right" ss:LineStyle="Continuous" ss:Weight="1"/><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1"/></Borders></Style></Styles><Worksheet ss:Name="Sheet1"><Table ss:DefaultColumnWidth="100">');
            rows.push('<Row>');
            for(let k=0; k<4; k++) { rows.push('<Cell ss:StyleID="Default"><Data ss:Type="String">日期</Data></Cell><Cell ss:StyleID="Default"><Data ss:Type="String">' + CONFIG.daysToAdd + '日</Data></Cell>'); }
            rows.push('</Row>');
            const today = new Date();
            const totalDays = 120;
            const rowsNeeded = Math.ceil(totalDays / 4);
            for (let r = 0; r < rowsNeeded; r++) {
                rows.push('<Row>');
                for (let c = 0; c < 4; c++) {
                    const dayOffset = r + (c * rowsNeeded);
                    if (dayOffset < totalDays) {
                        const currentDate = new Date(today.getTime() + dayOffset * 86400000);
                        const res = calculateWorkdayDate(currentDate, CONFIG.daysToAdd);
                        rows.push(`<Cell ss:StyleID="Default"><Data ss:Type="String">${formatDateKey(currentDate)}</Data></Cell><Cell ss:StyleID="Default"><Data ss:Type="String">${formatDateKey(res.date)}</Data></Cell>`);
                    } else { rows.push('<Cell ss:StyleID="Default"><Data ss:Type="String"></Data></Cell><Cell ss:StyleID="Default"><Data ss:Type="String"></Data></Cell>'); }
                }
                rows.push('</Row>');
            }
            rows.push('</Table></Worksheet></Workbook>');
            const blob = new Blob([rows.join('\n')], { type: 'application/vnd.ms-excel;charset=utf-8' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "120days_calculation.xls";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        } catch (error) { console.error('導出失敗:', error); alert('導出失敗，請查看控制台'); }
    }
