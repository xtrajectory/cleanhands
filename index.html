<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cleanhands page</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/?size=160&id=0WINekHENi8b&format=png" sizes="96x96">
    <style>
        /* === 全局變量與基礎設置 === */
        :root {
            --bg-color: black;
            --text-color: white;
            --primary-color: orange;
            --accent-color: #C6A300;
            --glass-bg: rgba(30, 30, 30, 0.8);
            --glass-border: rgba(255, 255, 255, 0.15);
            --grey-text: #aaa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px 0 100px 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        /* === Hero 時間顯示區 === */
        .hero-section {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease-out;
            margin-top: 40px;
        }

        .hero-time {
            font-size: 4.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(198, 163, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }

        .hero-date {
            font-size: 2rem;
            color: var(--primary-color);
            margin-top: 10px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        h1 {
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #ccc;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 1px;
            display: inline-block;
        }

        /* === 主結果顯示區 (強化優化版) === */
        #result {
            margin-top: 10px;
            padding: 30px 50px;
            border: 2px solid rgba(198, 163, 0, 0.4);
            border-radius: 24px;
            background: linear-gradient(145deg, rgba(40, 40, 40, 0.9), rgba(20, 20, 20, 0.9));
            box-shadow: 0 15px 50px rgba(198, 163, 0, 0.15);
            text-align: center;
            max-width: 90%;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
        }

        .res-label {
            color: #ff4d4d;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .res-main-date {
            font-size: 42px;
            color: #ffffff;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .res-weekday {
            font-size: 24px;
            color: var(--primary-color);
            margin-top: 8px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* === 按鈕區域 === */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            width: 95%;
            max-width: 800px;
            flex-wrap: nowrap;
        }

        .button-container button {
            background-color: var(--glass-bg);
            color: #ddd;
            font-size: 15px;
            border: 1px solid var(--glass-border);
            padding: 12px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .button-container button:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* === 結果展示卡片 === */
        .result-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px 35px;
            margin: 30px auto;
            width: fit-content;
            max-width: 95vw;
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.4s ease-out;
            box-sizing: border-box;
            display: block;
        }

        /* === 未來五天表格 === */
        .modern-table {
            border-collapse: collapse;
            margin: 0 auto;
        }
        
        .modern-table th {
            text-align: center;
            color: var(--grey-text);
            font-size: 13px;
            padding: 0 15px 10px 15px;
            border-bottom: 1px solid var(--glass-border);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .modern-table td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
            white-space: nowrap;
            text-align: center;
        }

        .modern-table tr:last-child td { border-bottom: none; }

        .date-start { color: #ccc; }
        .arrow { color: #666; font-size: 14px; padding: 0 5px; }
        .date-end { color: var(--primary-color); font-weight: bold; }
        .header-highlight { color: var(--accent-color); font-weight: bold; }

        /* === 驗算列表 === */
        .verify-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            gap: 40px;
            white-space: nowrap;
        }

        .verify-days-count { font-size: 32px; color: var(--accent-color); font-weight: bold; }
        .verify-days-label { color: var(--grey-text); font-size: 14px; }
        
        .verify-subtitle {
            text-align: left;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            white-space: nowrap;
        }

        .timeline-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .timeline-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
            gap: 20px;
        }

        .timeline-left { display: flex; align-items: center; gap: 12px; }

        .timeline-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #ff4d4d;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
            flex-shrink: 0;
        }

        .timeline-date { color: #fff; font-size: 15px; }
        .timeline-reason { color: #ff6666; font-size: 14px; text-align: right; flex-shrink: 0; white-space: nowrap; }
        .timeline-empty { color: #4CAF50; text-align: center; padding: 15px; font-style: italic; white-space: nowrap; }

        /* 驗算框：依假期文字長度自動增寬，避免橫向滾動 */
        .result-box.verify-box {
            width: max-content;
            max-width: 95vw;
            min-width: min(320px, 95vw);
            overflow-x: visible;
        }
        .result-box.verify-box .timeline-list {
            overflow-x: visible;
        }

        /* === 底部導航欄 === */
        .map-button-container {
            position: fixed;
            right: 20px;
            bottom: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: fit-content;
            max-width: 800px; 
            transition: all 0.3s ease;
        }

        .map-button-row {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: flex-end;
        }

        #hiddenRow {
            display: none;
            width: 100%;
            justify-content: flex-start;
            animation: slideUp 0.3s ease-out;
        }

        .map-button {
            background-color: #977C00;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            transition: transform 0.2s, background-color 0.2s;
        }
        
        .map-button:active { transform: scale(0.95); }
        .map-button-row a { text-decoration: none; }

        #toggleBtn {
            background: transparent;
            border: none;
            box-shadow: none;
            width: 30px;
            padding: 0;
            color: #666;
            font-size: 26px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, color 0.3s;
            margin-left: 2px;
        }
        
        #toggleBtn:hover { color: #aaa; transform: scale(1.1); }
        #toggleBtn.rotated { transform: rotate(180deg); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-info {
            margin-top: 20px;
            text-align: center;
            color: #555;
            font-size: 12px;
        }

        #disclaimer { margin: 0; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* === 手機適配 === */
        @media (max-width: 768px) {
            .hero-time { font-size: 3.5rem; }
            .hero-date { font-size: 1.5rem; }
            
            .res-main-date { font-size: 32px; }
            .res-weekday { font-size: 20px; }

            .result-box { max-width: 95%; overflow-x: auto; }
            .result-box.verify-box { max-width: 95vw; overflow-x: visible; width: max-content; }
            
            .button-container {
                gap: 8px; 
                padding: 0 10px;
            }
            
            .button-container button {
                font-size: 13px;
                padding: 10px 2px;
            }

            .map-button-container {
                right: 0; bottom: 0; left: 0;
                width: 100%; max-width: 100vw;
                background-color: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(10px);
                padding: 6px 4px;
                border-top: 1px solid #333;
                gap: 6px;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
            }

            .map-button-row {
                display: flex; flex-wrap: nowrap;
                justify-content: space-between;
                width: 100%; overflow-x: visible;
                gap: 6px; 
            }

            #hiddenRow { justify-content: flex-start; }

            .map-button {
                font-size: 13px; padding: 0 5px; height: 36px;
                width: auto; min-width: 0; white-space: nowrap; flex: 0 1 auto;
            }

            .map-button-row a { flex: 1 1 auto; min-width: 0; display: flex; }
            .map-button-row a button { width: 100%; }

            #toggleBtn { width: 25px; font-size: 20px; padding: 0; margin: 0; }
            .footer-info { margin-bottom: 140px; }
        }
    </style>

</head>

    <script>
    // ================= 配置與數據 =================
    const CONFIG = {
        daysToAdd: 15,
        titles: ["我是計算器"]
    };

    const WEEKDAYS = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];

    const SPECIAL_HOLIDAYS = {
        "2026-01-01": "元旦",
        "2026-02-16": "農曆除夕(下午)",
        "2026-02-17": "農曆正月初一",
        "2026-02-18": "農曆正月初二",
        "2026-02-19": "農曆正月初三",
        "2026-04-03": "耶穌受難日",
        "2026-04-04": "復活節前日",
        "2026-04-05": "清明節",
        "2026-04-06": "復活節前日的補假",
        "2026-04-07": "清明節的補假",
        "2026-05-01": "勞動節",
        "2026-05-24": "佛誕節",
        "2026-05-25": "佛誕節的補假",
        "2026-06-19": "端午節",
        "2026-09-26": "中秋節翌日",
        "2026-09-28": "中秋節翌日的補假",
        "2026-10-01": "中華人民共和國國慶日",
        "2026-10-02": "中華人民共和國國慶日翌日",
        "2026-10-18": "重陽節",
        "2026-10-19": "重陽節的補假",
        "2026-11-02": "追思節",
        "2026-12-08": "聖母無原罪瞻禮",
        "2026-12-20": "澳門特別行政區成立紀念日",
        "2026-12-21": "澳門特別行政區成立紀念日的補假",
        "2026-12-22": "冬至",
        "2026-12-24": "聖誕節前日",
        "2026-12-25": "聖誕節",
        "2026-12-31": "除夕(下午)"
    };

    const preventDefault = (e) => { e.preventDefault(); return false; };
    document.addEventListener('contextmenu', preventDefault);
    document.addEventListener('selectstart', preventDefault);
    document.addEventListener('copy', preventDefault);
    document.addEventListener('cut', preventDefault);
    document.addEventListener('paste', preventDefault);
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey && ['a', 'c', 'v'].includes(e.key.toLowerCase())) || e.key === 'F12') {
            preventDefault(e);
        }
    });

    function formatDateKey(date) { 
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function checkRestDay(date) {
        const dayOfWeek = date.getDay();
        const dateStr = formatDateKey(date); 
        if (dayOfWeek === 0) return { isRestDay: true, reason: "星期日" };
        if (dayOfWeek === 6) return { isRestDay: true, reason: "星期六" };
        if (SPECIAL_HOLIDAYS[dateStr]) return { isRestDay: true, reason: SPECIAL_HOLIDAYS[dateStr] };
        return { isRestDay: false, reason: "" };
    }

    function calculateWorkdayDate(startDate, daysToAdd) {
        let targetDate = new Date(startDate.getTime());
        targetDate.setHours(12, 0, 0, 0);
        targetDate.setDate(targetDate.getDate() + daysToAdd);

        let logs = [];
        while (true) {
            const status = checkRestDay(targetDate);
            if (status.isRestDay) {
                logs.push({ dateStr: formatDateKey(targetDate), dateObj: new Date(targetDate), reason: status.reason });
                targetDate.setDate(targetDate.getDate() + 1);
            } else { break; }
        }
        return { date: targetDate, logs: logs };
    }

    function updateTimeDisplays() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
        const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${WEEKDAYS[now.getDay()]}`;
        document.getElementById('heroTime').textContent = timeStr;
        document.getElementById('heroDate').textContent = dateStr;
    }

    function updateMainDisplay() {
        const today = new Date();
        const result = calculateWorkdayDate(today, CONFIG.daysToAdd);
        const d = result.date;
        
        // 修改渲染結構以搭配新的視覺樣式
        document.getElementById('result').innerHTML = `
            <div class="res-label">${CONFIG.daysToAdd} 天後的日期</div>
            <div class="res-main-date">${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日</div>
            <div class="res-weekday">${WEEKDAYS[d.getDay()]}</div>
        `;
    }

    function toggleFutureDates() {
        const tableDiv = document.getElementById('futureDatesTable');
        const verifyDiv = document.getElementById('verificationResult');
        verifyDiv.style.display = 'none';
        if (tableDiv.style.display === 'block') {
            tableDiv.style.display = 'none';
        } else {
            let html = `
                <div class="result-box">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th style="text-align:center;">今天</th>
                                <th></th>
                                <th style="text-align:center;" class="header-highlight">第${CONFIG.daysToAdd}天</th>
                            </tr>
                        </thead>
                        <tbody>`;
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            for (let i = 0; i < 5; i++) {
                const baseDate = new Date(tomorrow.getTime() + i * 86400000);
                const res = calculateWorkdayDate(baseDate, CONFIG.daysToAdd);
                const d = res.date;
                const baseText = `${baseDate.getFullYear()}/${baseDate.getMonth() + 1}/${baseDate.getDate()} (${WEEKDAYS[baseDate.getDay()].replace('星期','週')})`;
                const resText = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} (${WEEKDAYS[d.getDay()].replace('星期','週')})`;
                html += `
                    <tr>
                        <td class="date-start">${baseText}</td>
                        <td class="arrow">➔</td>
                        <td class="date-end">${resText}</td>
                    </tr>`;
            }
            html += `</tbody></table><div style="text-align:center; margin-top:15px; font-size:12px; color:#666;">(未來5天預測)</div></div>`;
            tableDiv.innerHTML = html;
            tableDiv.style.display = 'block';
        }
    }

    function toggleVerification() {
        const verifyDiv = document.getElementById('verificationResult');
        const tableDiv = document.getElementById('futureDatesTable');
        tableDiv.style.display = 'none';
        if (verifyDiv.style.display === 'block') {
            verifyDiv.style.display = 'none';
        } else {
            const today = new Date();
            const result = calculateWorkdayDate(today, CONFIG.daysToAdd);
            const endDate = result.date;
            
            const d1 = new Date(today); d1.setHours(0,0,0,0);
            const d2 = new Date(endDate); d2.setHours(0,0,0,0);
            const totalDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
            
            let html = `<div class="result-box verify-box"><div class="verify-summary"><div class="verify-days-label">總跨度天數</div><div class="verify-days-count">${totalDays} 天</div></div>`;
            
            if (result.logs.length > 0) {
                html += `<div class="verify-subtitle">第${CONFIG.daysToAdd}天遇到以下假期，需要順延：</div>`;
                html += `<div class="timeline-list">`;
                result.logs.forEach(log => {
                    const dateShort = `${log.dateObj.getFullYear()}/${log.dateObj.getMonth()+1}/${log.dateObj.getDate()}`;
                    const weekDayShort = WEEKDAYS[log.dateObj.getDay()].replace('星期','');
                    html += `<div class="timeline-row"><div class="timeline-left"><span class="timeline-dot"></span><span class="timeline-date">${dateShort} (${weekDayShort})</span></div><span class="timeline-reason">${log.reason}</span></div>`;
                });
                html += `</div>`;
            } else { 
                html += `<div class="timeline-empty">⭕期間無任何假期或週末，無需順延。</div>`; 
            }
            html += `</div>`;
            verifyDiv.innerHTML = html;
            verifyDiv.style.display = 'block';
        }
    }

    function export120DaysTable() {
        try {
            const rows = [];
            rows.push('<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet" xmlns:html="http://www.w3.org/TR/REC-html40">');
            rows.push('<Styles><Style ss:ID="Default"><Alignment ss:Horizontal="Center" ss:Vertical="Center"/><Borders><Border ss:Position="Left" ss:LineStyle="Continuous" ss:Weight="1"/><Border ss:Position="Top" ss:LineStyle="Continuous" ss:Weight="1"/><Border ss:Position="Right" ss:LineStyle="Continuous" ss:Weight="1"/><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1"/></Borders></Style></Styles><Worksheet ss:Name="Sheet1"><Table ss:DefaultColumnWidth="100">');
            rows.push('<Row>');
            for(let k=0; k<4; k++) { rows.push('<Cell ss:StyleID="Default"><Data ss:Type="String">日期</Data></Cell><Cell ss:StyleID="Default"><Data ss:Type="String">' + CONFIG.daysToAdd + '日</Data></Cell>'); }
            rows.push('</Row>');
            const today = new Date();
            const totalDays = 120;
            const rowsNeeded = Math.ceil(totalDays / 4);
            for (let r = 0; r < rowsNeeded; r++) {
                rows.push('<Row>');
                for (let c = 0; c < 4; c++) {
                    const dayOffset = r + (c * rowsNeeded);
                    if (dayOffset < totalDays) {
                        const currentDate = new Date(today.getTime() + dayOffset * 86400000);
                        const res = calculateWorkdayDate(currentDate, CONFIG.daysToAdd);
                        rows.push(`<Cell ss:StyleID="Default"><Data ss:Type="String">${formatDateKey(currentDate)}</Data></Cell><Cell ss:StyleID="Default"><Data ss:Type="String">${formatDateKey(res.date)}</Data></Cell>`);
                    } else { rows.push('<Cell ss:StyleID="Default"><Data ss:Type="String"></Data></Cell><Cell ss:StyleID="Default"><Data ss:Type="String"></Data></Cell>'); }
                }
                rows.push('</Row>');
            }
            rows.push('</Table></Worksheet></Workbook>');
            const blob = new Blob([rows.join('\n')], { type: 'application/vnd.ms-excel;charset=utf-8' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `120days_calculation_${new Date().getFullYear()}.xls`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        } catch (error) { console.error('導出失敗:', error); alert('導出失敗，請查看控制台'); }
    }

    // === 底部導航欄折疊邏輯 ===
    function initNavToggle() {
        const toggleBtn = document.getElementById('toggleBtn');
        const hiddenRow = document.getElementById('hiddenRow');
        const navContainer = document.getElementById('navContainer');
        let isOpen = false;

        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            isOpen = !isOpen;
            
            if (isOpen) {
                hiddenRow.style.display = 'flex';
                toggleBtn.classList.add('rotated');
            } else {
                hiddenRow.style.display = 'none';
                toggleBtn.classList.remove('rotated');
            }
        });

        document.addEventListener('click', function(e) {
            if (isOpen && !navContainer.contains(e.target)) {
                isOpen = false;
                hiddenRow.style.display = 'none';
                toggleBtn.classList.remove('rotated');
            }
        });
    }

    function init() {
        document.getElementById('randomTitle').textContent = CONFIG.titles[Math.floor(Math.random() * CONFIG.titles.length)];
        updateTimeDisplays();
        updateMainDisplay();
        initNavToggle(); 
        setInterval(updateTimeDisplays, 1000);
        setInterval(updateMainDisplay, 60000);
    }
    init();
    </script>
