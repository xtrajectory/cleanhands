<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schools Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a7a4a;
    --green-dark: #155c38;
    --green-light: #e8f5ee;
    --orange: #e07b00;
    --orange-light: #fff4e0;
    --rose: #b83060;
    --rose-light: #fde8f0;
    --text-primary: #1a1f1c;
    --text-secondary: #5a6b62;
    --border: #d4ddd8;
    --bg: #f4f7f5;
    --card-bg: #fff;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.18);
    --radius: 10px;
  }

  html, body {
    height: 100%; overflow: hidden; background: var(--bg);
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px; display: flex; align-items: center; gap: 10px;
    background: var(--green); padding: 0 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  #menu-btn {
    width: 38px; height: 38px; border-radius: 8px; border: none;
    background: rgba(255,255,255,0.15); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }
  #menu-btn:hover { background: rgba(255,255,255,0.25); }

  /* Desktop hover zone — invisible hit-area that triggers the drawer */
  #menu-hover-zone {
    position: fixed; top: 0; left: 0; width: 60px; height: 100vh;
    z-index: 250; pointer-events: none;
  }
  /* On non-touch devices, hovering this zone opens the drawer */
  @media (hover: hover) and (pointer: fine) {
    #menu-hover-zone { pointer-events: auto; }
    #menu-hover-zone:hover ~ #drawer,
    #drawer:hover { transform: translateX(0); }
    #menu-hover-zone:hover ~ #overlay-desktop,
    #drawer:hover ~ #overlay-desktop { opacity: 1; pointer-events: auto; }
    /* Show tooltip hint on button hover */
    #menu-btn::after {
      content: "懸停以展開"; position: absolute;
      left: 46px; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.72); color: #fff;
      font-size: 11px; padding: 4px 8px; border-radius: 6px;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity 0.2s 0.4s;
    }
    #menu-btn:hover::after { opacity: 1; }
  }

  /* Separate lighter overlay for desktop hover (doesn't block interaction) */
  #overlay-desktop {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.25);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  @media (hover: hover) and (pointer: fine) {
    #overlay-desktop { display: block; }
  }
  #topbar-title {
    font-size: 14px; font-weight: 600; color: #fff;
    line-height: 1.3; flex: 1;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  #topbar-active {
    font-size: 11px; color: rgba(255,255,255,0.8);
    max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── OVERLAY ── */
  #overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.45);
  }
  #overlay.open { display: block; }

  /* ── DRAWER ── */
  #drawer {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 300;
    width: min(320px, 88vw);
    background: var(--bg);
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);
  }
  #drawer.open { transform: translateX(0); }

  #drawer-header {
    background: var(--green); padding: 14px 14px 10px;
    flex-shrink: 0;
  }
  #drawer-header h2 {
    font-size: 14px; font-weight: 600; color: #fff; line-height: 1.4;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  .drawer-stats {
    display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.18); border-radius: 20px;
    padding: 3px 9px; font-size: 11px; color: rgba(255,255,255,0.95);
  }
  .stat-pill strong { font-weight: 600; }

  /* ── PHASE PANELS ── */
  #school-list {
    flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0;
  }

  .phase-group {
    display: flex; flex-direction: column;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 0;
    transition: flex 0.65s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .phase-group.expanded {
    flex: 1;
    min-height: 0;
  }

  .phase-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; background: var(--green-light);
    cursor: pointer; user-select: none;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .phase-header:hover { background: #d4eddf; }

  .phase-header-left {
    display: flex; align-items: center; gap: 7px;
  }
  .phase-label {
    font-size: 12px; font-weight: 600; color: var(--green-dark);
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  .phase-count {
    font-size: 10px; color: var(--text-secondary);
    background: rgba(0,0,0,0.07); border-radius: 10px; padding: 1px 7px;
  }
  .phase-chevron {
    font-size: 14px; color: var(--green); transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .phase-group.expanded .phase-chevron { transform: rotate(180deg); }

  .phase-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.65s cubic-bezier(0.25, 0.8, 0.25, 1);
    flex-shrink: 0;
  }
  .phase-group.expanded .phase-body {
    overflow-y: auto;
    max-height: none;
    flex: 1;
    min-height: 0;
  }
  .phase-body::-webkit-scrollbar { width: 3px; }
  .phase-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── SCHOOL ROW ── */
  .school-row {
    display: flex; align-items: center; gap: 0;
    padding: 0; cursor: pointer; border: none; width: 100%; text-align: left;
    background: transparent;
    border-bottom: 0.5px solid var(--border);
    transition: filter 0.12s;
  }
  .school-row:active { filter: brightness(0.94); }
  .school-row.active .row-body { font-weight: 600; }

  /* alternating row colors */
  .phase-body .school-row:nth-child(6n+1) .row-color { background: #e8f5ee; }
  .phase-body .school-row:nth-child(6n+2) .row-color { background: #e6f1fb; }
  .phase-body .school-row:nth-child(6n+3) .row-color { background: #fff4e0; }
  .phase-body .school-row:nth-child(6n+4) .row-color { background: #fde8f0; }
  .phase-body .school-row:nth-child(6n+5) .row-color { background: #f0ecfb; }
  .phase-body .school-row:nth-child(6n+6) .row-color { background: #e8f5f0; }

  .school-row.active .row-color {
    background: var(--green) !important;
  }

  .row-color {
    width: 32px; min-width: 32px; align-self: stretch;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    transition: background 0.15s;
  }
  .school-row.active .row-color { color: #fff; }

  .row-body {
    flex: 1; padding: 9px 10px 9px 8px; min-width: 0;
  }
  .row-name {
    font-size: 13px; color: var(--text-primary); line-height: 1.35;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-meta {
    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .type-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 400;
    flex-shrink: 0;
  }
  .badge-school { background: #ddeefb; color: #185fa5; }
  .badge-nursery { background: #faeeda; color: #854f0b; }
  .badge-special { background: #fbeaf0; color: #993556; }
  .row-addr {
    font-size: 10px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .row-actions {
    display: flex; flex-direction: column; gap: 4px;
    padding: 8px 8px 8px 4px; flex-shrink: 0;
  }
  .btn-locate {
    display: flex; align-items: center; gap: 3px;
    padding: 5px 9px; background: var(--green); color: #fff;
    border: none; border-radius: 7px; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .btn-locate:hover { background: var(--green-dark); }
  .btn-locate:disabled { background: #7fb89e; }
  .btn-web {
    display: flex; align-items: center; gap: 3px;
    padding: 5px 9px; background: transparent;
    color: var(--text-secondary); border: 0.5px solid var(--border);
    border-radius: 7px; font-size: 11px; text-decoration: none;
    white-space: nowrap; transition: border-color 0.15s;
  }
  .btn-web:hover { border-color: #999; color: var(--text-primary); }

  /* ── MAP AREA ── */
  #map-wrap {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0; z-index: 1;
  }
  #gis-map { width: 100%; height: 100%; border: none; display: block; }

  /* ── BOTTOM INFO BAR ── */
  #info-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--card-bg);
    border-top: 0.5px solid var(--border);
    padding: 8px 14px 10px;
    display: none;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.10);
  }
  #info-bar.visible { display: block; }
  #info-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  #info-addr { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
</style>
</head>

<body oncontextmenu="return false;" onselectstart="return false;" oncopy="return false;">

<div id="topbar">
  <button id="menu-btn" onclick="toggleDrawer()" aria-label="選單">
    <i class="ti ti-menu-2"></i>
  </button>
  <div id="topbar-title">澳門學校及托兒所<br>導覽地圖</div>
  <div id="topbar-active"></div>
</div>

<div id="overlay" onclick="closeDrawer()"></div>

<div id="overlay-desktop"></div>

<div id="menu-hover-zone"></div>

<div id="drawer" class="open">
  <div id="drawer-header">
    <h2>📍 澳門學校及托兒所</h2>
    <div class="drawer-stats">
      <div class="stat-pill"><i class="ti ti-school"></i> 學校 <strong>10</strong></div>
      <div class="stat-pill"><i class="ti ti-building"></i> 托兒所 <strong>5</strong></div>
      <div class="stat-pill"><i class="ti ti-map-pin"></i> 合計 <strong>16</strong></div>
    </div>
  </div>
  <div id="school-list"></div>
</div>

<div id="map-wrap" onclick="closeDrawer()">
  <iframe id="gis-map"
    src="https://maps.google.com/maps?q=澳門&z=13&output=embed&hl=zh-TW"
    allowfullscreen loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

<div id="info-bar">
  <div id="info-name"></div>
  <div id="info-addr"></div>
</div>

<script>
// Phase 1 names (must match exactly)
const phase1Names = ["澳門工聯職業技術中學", "海星中學(附屬小學)", "澳門教區梁文燕托兒所親子館", "氹仔中葡學校"];

const allSchools = [
  { name: "澳門工聯職業技術中學", search: "工聯職業技術培訓中心 澳門台山", addr: "澳門台山李寶椿街", url: "https://www.kljc.edu.mo/", type: "school" },
  { name: "海星中學(附屬小學)", search: "海星中學 澳門燒灰爐街32-34號32-34號", addr: "澳門燒灰爨巷10-12號", url: "https://edm.edu.mo/", type: "school" },
  { name: "澳門教區梁文燕托兒所親子館", search: "梁文燕托兒所 澳門公園街", addr: "澳門公園街", url: "https://www.cdhl.mo/", type: "nursery" },
  { name: "氹仔中葡學校", search: "氹仔中葡學校 氹仔巴波沙總督前地", addr: "氹仔巴波沙總督前地", url: "https://www.lct.k12.edu.mo/lct/", type: "school" },
  { name: "孟智豪托兒所", search: "澳門街坊會聯合總會孟智豪托兒所 澳門菜園涌巷70號", addr: "澳門菜園涌巷70號澳門大廈地下", url: "https://www.ugamm.org.mo/portal/ctr/cms/info/goToInfoView?info_id=9d917c2cf88449f482fbe8c9eaa0e891", type: "nursery" },
  { name: "協同特殊教育學校", search: "協同特殊教育學校 澳門青洲收容所街35號", addr: "澳門青洲收容所街35號", url: "https://csse.k12.edu.mo/", type: "special" },
  { name: "同善堂第五托兒所", search: "同善堂第五托兒所", addr: "黑沙環1A號同善堂崔德祺主席紀念樓", url: "https://www.tst.org.mo/index.php/our-services/our-services-4", type: "nursery" },
  { name: "婦聯學校", search: "婦聯學校 澳門馬揸度博士大馬路362號", addr: "澳門馬揸度博士大馬路362號", url: "https://fuluen.edu.mo/pages/433", type: "school" },
  { name: "鏡平學校(小學部)", search: "鏡平學校小學 澳門俾利喇街", addr: "澳門俾利喇街126-128A號", url: "http://www.keangpeng.edu.mo/introduction/primary", type: "school" },
  { name: "庇道學校", search: "庇道學校 澳門高地烏街118號", addr: "澳門高地烏街118號", url: "https://www.brito.edu.mo/", type: "school" },
  { name: "培道中學小學部", search: "培道中學 美麗街高小部 澳門美麗街11號", addr: "澳門美麗街11號", url: "https://primary.pooito.edu.mo/html5/", type: "school" },
  { name: "聖羅撒托兒所", search: "聖羅撒托兒所 東望洋新街348號 澳門", addr: "東望洋新街348號地下", url: "https://infantariodesantarosa.org.mo/", type: "nursery" },
  { name: "下環浸會學校", search: "下環浸信會學校 澳門下環街46號", addr: "澳門下環街46-48號地下", url: "https://school.hwbs.edu.mo/", type: "school" },
  { name: "仁慈堂李愛禮西灣托兒所", search: "仁慈堂李愛禮西灣托兒所 Creche Lara Reis nºs, 58-60 民國大馬路澳門", addr: "澳門民國大馬路58-60號", url: "http://www.scmm.mo/frontend/content/index.php?id=34&hl=cn", type: "nursery" },
  { name: "氹仔坊眾學校幼稚園", search: "氹仔坊眾學校 澳門氹仔律政司街", addr: "氹仔律政司街", url: "https://fctweb.org/2024/index.php", type: "school" },
  { name: "明愛學校", search: "明愛學校 氹仔里斯本街387號 澳門", addr: "氹仔里斯本街387號", url: "https://www.caritas.org.mo/education-service/199", type: "school" },
];

// Split into phases
const phase1Schools = allSchools.filter(s => phase1Names.includes(s.name));
const phase2Schools = allSchools.filter(s => !phase1Names.includes(s.name));

// Flat list for locateOnMap, keyed by unique id
const schools = [];
const typeLabel = { school: "學校", nursery: "托兒所", special: "特殊教育" };
const typeBadge = { school: "badge-school", nursery: "badge-nursery", special: "badge-special" };

const list = document.getElementById('school-list');
const mapFrame = document.getElementById('gis-map');
const topbarActive = document.getElementById('topbar-active');
const infoBar = document.getElementById('info-bar');
const infoName = document.getElementById('info-name');
const infoAddr = document.getElementById('info-addr');
let activeIdx = null;

let phase1Group, phase2Group;

// Detect touch/mobile device
const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches
  || ('ontouchstart' in window && navigator.maxTouchPoints > 0);

function buildPhaseGroup(phaseSchools, phaseLabel, defaultExpanded, phaseId) {
  const group = document.createElement('div');
  group.className = 'phase-group' + (defaultExpanded ? ' expanded' : '');
  group.dataset.id = phaseId;

  const header = document.createElement('div');
  header.className = 'phase-header';
  header.innerHTML = `
    <div class="phase-header-left">
      <span class="phase-label">${phaseLabel}</span>
      <span class="phase-count">${phaseSchools.length} 所</span>
    </div>
    <i class="ti ti-chevron-down phase-chevron"></i>
  `;

  const body = document.createElement('div');
  body.className = 'phase-body';

  phaseSchools.forEach((s, localIdx) => {
    const globalIdx = schools.length;
    schools.push(s);

    const row = document.createElement('div');
    row.className = 'school-row';
    row.id = 'row-' + globalIdx;

    row.innerHTML = `
      <div class="row-color">${localIdx + 1}</div>
      <div class="row-body">
        <div class="row-name">${s.name}</div>
        <div class="row-meta">
          <span class="type-badge ${typeBadge[s.type]}">${typeLabel[s.type]}</span>
          <span class="row-addr">${s.addr}</span>
        </div>
      </div>
      <div class="row-actions">
        <button class="btn-locate" id="btn-${globalIdx}" onclick="event.stopPropagation(); locateOnMap(${globalIdx})">
          <i class="ti ti-crosshair"></i> 定位
        </button>
        <a class="btn-web" href="${s.url}" target="_blank" onclick="event.stopPropagation()">
          <i class="ti ti-external-link"></i> 網站
        </a>
      </div>
    `;
    row.addEventListener('click', () => locateOnMap(globalIdx));
    body.appendChild(row);
  });

  // 互斥折疊的核心處理函數
  function triggerToggle() {
    if (phaseId === 1) {
      if (!group.classList.contains('expanded')) {
        group.classList.add('expanded');
        if (phase2Group) phase2Group.classList.remove('expanded');
      }
    } else if (phaseId === 2) {
      if (!group.classList.contains('expanded')) {
        group.classList.add('expanded');
        if (phase1Group) phase1Group.classList.remove('expanded');
      }
    }
  }

  // 點擊事件
  header.addEventListener('click', (e) => {
    e.stopPropagation();
    // 如果點擊的是已經打開的階段，則做反向切換（維持總有一個是開的）
    if (group.classList.contains('expanded')) {
      if (phaseId === 1 && phase2Group) {
        group.classList.remove('expanded');
        phase2Group.classList.add('expanded');
      } else if (phaseId === 2 && phase1Group) {
        group.classList.remove('expanded');
        phase1Group.classList.add('expanded');
      }
    } else {
      triggerToggle();
    }
  });

  // 新增：滑鼠移過（懸停）時直接觸發與點擊類似的效果（僅限非手機非觸控裝置）
  if (!isMobile) {
    header.addEventListener('mouseenter', () => {
      triggerToggle();
    });
  }

  group.appendChild(header);
  group.appendChild(body);
  return group;
}

// 建立階段分組
phase1Group = buildPhaseGroup(phase1Schools, '第一階段 (2025年11月24日)', false, 1);
phase2Group = buildPhaseGroup(phase2Schools, '第二階段 (2026年5月25日)', true, 2);

list.appendChild(phase1Group);
list.appendChild(phase2Group);

function locateOnMap(idx) {
  const s = schools[idx];
  const btn = document.getElementById('btn-' + idx);

  if (activeIdx !== null) {
    document.getElementById('row-' + activeIdx).classList.remove('active');
  }
  document.getElementById('row-' + idx).classList.add('active');
  activeIdx = idx;

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> 搜索…';

  topbarActive.textContent = s.name;
  infoName.textContent = s.name;
  infoAddr.textContent = s.addr;
  infoBar.classList.add('visible');

  const query = encodeURIComponent(s.search);
  mapFrame.src = `https://maps.google.com/maps?q=${query}&z=17&iwloc=B&output=embed&hl=zh-TW`;

  mapFrame.onload = () => {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-crosshair"></i> 定位';
  };

  closeDrawer();
}

// 側邊欄重置為預設狀態的函數
function resetDrawerContent() {
  if (phase1Group) phase1Group.classList.remove('expanded');
  if (phase2Group) phase2Group.classList.add('expanded');
}

function toggleDrawer() {
  const d = document.getElementById('drawer');
  const o = document.getElementById('overlay');
  
  if (!d.classList.contains('open')) {
    d.classList.add('open');
    o.classList.add('open');
  } else {
    d.classList.remove('open');
    o.classList.remove('open');
    // 修改：手動點擊三條槓隱藏後，重置內容狀態
    resetDrawerContent();
  }
}

function closeDrawer() {
  const d = document.getElementById('drawer');
  const o = document.getElementById('overlay');
  
  // 只有當抽屜本來是打開的時候，關閉時才執行重置
  if (d.classList.contains('open')) {
    d.classList.remove('open');
    o.classList.remove('open');
    // 修改：任何情況下（點地圖、點學校等）抽屜隱藏後，立即重置內容
    resetDrawerContent();
  }
}

// 初始化開啟遮罩
document.getElementById('overlay').classList.add('open');

(function () {
  const block = (e) => { e.preventDefault(); return false; };
  document.addEventListener('contextmenu', block);
  document.addEventListener('selectstart', block);
  document.addEventListener('copy', block);
  document.addEventListener('cut', block);
  document.addEventListener('dragstart', block);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'F12' || e.keyCode === 123) return block(e);
    if (e.ctrlKey && e.shiftKey && [73, 67, 74].includes(e.keyCode)) return block(e);
    if (e.ctrlKey && e.keyCode === 85) return block(e);
    if (e.ctrlKey && ['a', 'c', 's', 'u'].includes(e.key.toLowerCase())) return block(e);
  });
})();
</script>
