<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <!-- 🔒 鎖定 viewport，防止整個網頁被縮放 -->
  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no,
      viewport-fit=cover
    "
  />

  <title>Map</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;

      /* 🔒 防止橡皮筋彈跳與整頁拖動 */
      overscroll-behavior: none;
      /* ✅ 鎖定整頁手勢，避免頁面跟著縮放/拖動 */
      touch-action: none;
    }

    body {
      background-color: #f5f5f5;
      /* ✅ 用 flex 做穩定框架：地圖區 + 底部按鈕列 */
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    .map-container {
      flex: 1 1 auto;
      width: 100%;
      min-height: 0; /* ✅ 允許 iframe 正確在 flex 容器內縮放 */

      /* ✅ 只允許地圖本身的手勢（拖曳/雙指縮放） */
      touch-action: pan-x pan-y pinch-zoom;
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .map-link {
      flex: 0 0 50px;
      width: 100%;
      height: 50px;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .map-link a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, sans-serif;
      transition: color 0.3s ease;
    }

    .map-link a:hover {
      color: #C6A300;
    }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EZTW98Q8GK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-EZTW98Q8GK');
  </script>
</head>

<body>
  <div class="map-container">
    <iframe
      src="https://www.google.com/maps/d/u/0/embed?mid=11twLLP7pK2SMFY7x_0Xl_rDlWOA&ehbc=2E312F"
      title="全螢幕嵌入地圖"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      allowfullscreen
    ></iframe>
  </div>

  <div class="map-link">
    <a
      href="https://www.google.com/maps/d/u/0/edit?mid=11twLLP7pK2SMFY7x_0Xl_rDlWOA&usp=sharing"
      target="_blank"
      rel="noopener noreferrer"
    >
      Open Google MAP
    </a>
  </div>

  <!-- 🔒 進一步阻止整個頁面的手勢縮放（雙指或兩指拖動） -->
  <script>
    (function () {
      // iOS Safari 的手勢事件（雙指縮放）
      window.addEventListener('gesturestart', function (e) {
        e.preventDefault();
      }, { passive: false });

      window.addEventListener('gesturechange', function (e) {
        e.preventDefault();
      }, { passive: false });

      window.addEventListener('gestureend', function (e) {
        e.preventDefault();
      }, { passive: false });

      // 任何「多指移動」都阻止，避免整頁被放大縮小
      window.addEventListener('touchmove', function (e) {
        if (e.touches && e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      // 避免快速連點造成雙擊放大
      var lastTouchEnd = 0;
      window.addEventListener('touchend', function (e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    })();
  </script>
</body>
</html>
